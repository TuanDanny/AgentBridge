services:
  codexlink-relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: codexlink-relay:local
    environment:
      CODEXLINK_PUBLIC_URL: ${CODEXLINK_PUBLIC_URL:-https://relay.codexlink.example.com}
      PORT: "8788"
    ports:
      - "${CODEXLINK_RELAY_PORT:-8788}:8788"
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
